name: Feature Request
description: Suggest a new feature or improvement for an AgentHub product
title: "[Feature]: "
labels: ["feature", "triage"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which AgentHub product is this for?
      options:
        - AgentHub Pro
        - AgentHub Analyst
        - Both
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the pain point?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area of the product does this relate to?
      options:
        - Agents (Analyst, Requirement Engineer, Docs Generator)
        - MCP Tools (Jira, Confluence, GitHub, Swagger, Figma, PostHog)
        - Routing / Registry
        - Setup / Configuration
        - Output / Report Format
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or examples that would help explain the request.
    validations:
      required: false
