name: Bug Report
description: Report a bug or unexpected behavior in an AgentHub product
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which AgentHub product is this about?
      options:
        - AgentHub Pro
        - AgentHub Analyst
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open...
        2. Run prompt...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
    validations:
      required: true

  - type: dropdown
    id: ide
    attributes:
      label: IDE / AI Tool
      description: Which IDE or AI assistant are you using?
      options:
        - Claude Code
        - GitHub Copilot
        - Cursor
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g. macOS 14.5, Ubuntu 22.04, Windows 11
      placeholder: macOS 14.5
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AgentHub Version
      description: Check the VERSION file in your AgentHub workspace
      placeholder: "1.0.0"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant logs, error messages, or attach screenshots.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information (MCP tools used, agent involved, etc.)
    validations:
      required: false
