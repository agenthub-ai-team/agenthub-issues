name: Question / Support
description: Ask a question about AgentHub usage, setup, or behavior
title: "[Question]: "
labels: ["question", "triage"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which AgentHub product is this about?
      options:
        - AgentHub Pro
        - AgentHub Analyst
        - General / Both
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What I've Tried
      description: Describe any steps you've already taken or documentation you've checked.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area does your question relate to?
      options:
        - Setup / Installation
        - Agent Usage
        - MCP Tool Configuration
        - Output / Reports
        - Licensing
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant details (IDE, OS, version, screenshots).
    validations:
      required: false
